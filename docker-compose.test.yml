services:
  arrgh:
    image: ghcr.io/t2vi/arrgh:latest
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: sqlite:///data/arrgh.db
      DOWNLOAD_DIR: /data/downloads
      PLUGIN_URLS: "http://fixture:4001"
      JWT_SECRET: "e2e-test-secret"
      INDEX_INTERVAL_HOURS: "9999"
    volumes:
      - arrgh_test_data:/data
    depends_on:
      fixture:
        condition: service_healthy

  fixture:
    build:
      context: plugins/fixture
    ports:
      - "4001:4001"
    environment:
      PORT: "4001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

volumes:
  arrgh_test_data:
