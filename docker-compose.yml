services:
  arrgh:
    image: ghcr.io/t2vi/arrgh:latest
    # To build locally instead: comment out 'image' and uncomment 'build'
    # build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: sqlite:///data/arrgh.db
      MANGA_DIR: /data/manga
      # JWT_SECRET: change-me-in-production
      # INDEX_INTERVAL_HOURS: 6
      # RUST_LOG: arrgh_server=info
      # Comma-separated list of plugin URLs to auto-register on first startup.
      # Add new plugins here; they persist in the DB after first run.
      PLUGIN_URLS: "http://mangadex:4000,http://toonily:4001"
    volumes:
      - arrgh_data:/data
    depends_on:
      - mangadex
      - toonily

  mangadex:
    build: ./plugins/mangadex
    restart: unless-stopped
    environment:
      PORT: "4000"
      LANGUAGES: "en"
      # API_KEY: set-to-require-auth-from-arrgh
    # No ports exposed — arrgh reaches it over the internal network.
    # To expose locally for debugging: ports: ["4000:4000"]

  toonily:
    build: ./plugins/toonily
    restart: unless-stopped
    environment:
      PORT: "4001"
      FLARESOLVERR_URL: "http://flaresolverr:8191"
      # API_KEY: set-to-require-auth-from-arrgh
    depends_on:
      - flaresolverr
    # To expose locally for debugging: ports: ["4001:4001"]

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
    # No ports exposed — toonily reaches it over the internal network.
    # To expose locally for debugging: ports: ["8191:8191"]

volumes:
  arrgh_data:
