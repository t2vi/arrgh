services:
  arrgh:
    image: ghcr.io/t2vi/arrgh:latest
    # To build locally instead: comment out 'image' and uncomment 'build'
    # build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: sqlite:///data/arrgh.db
      DOWNLOAD_DIR: /data/downloads
      # JWT_SECRET: change-me-in-production
      # INDEX_INTERVAL_HOURS: 6
      # RUST_LOG: arrgh_server=info
      # Comma-separated list of plugin URLs to auto-register on first startup.
      # Add new plugins here; they persist in the DB after first run.
      PLUGIN_URLS: "http://plugin-host:4000"
    volumes:
      - arrgh_data:/data
    depends_on:
      - plugin-host

  plugin-host:
    build:
      context: .
      dockerfile: plugin-host/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "4000"
      LANGUAGES: "en"
      CLOAKBROWSER_WS_URL: "ws://cloakbrowser:3000"
      COMMUNITY_BUNDLES_DIR: /community-bundles
    volumes:
      - plugin_community_bundles:/community-bundles
    depends_on:
      - cloakbrowser
    # No ports exposed — arrgh reaches it over the internal network.
    # To expose locally for debugging: ports: ["4000:4000"]

  cloakbrowser:
    image: cloakhq/cloakbrowser
    restart: unless-stopped
    environment:
      MODE: cloakserve
    # No ports exposed — plugin-host reaches it over the internal network.
    # To expose locally for debugging: ports: ["3000:3000"]


volumes:
  arrgh_data:
  plugin_community_bundles:
