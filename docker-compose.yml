services:
  arrgh:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: sqlite:///data/arrgh.db   # maps to DatabasePath=/data/arrgh.db
      DOWNLOAD_DIR: /data/downloads
      # JWT_SECRET: your-secret-here   # optional — auto-generated if omitted (tokens reset on restart)
      PLUGIN_URLS: "http://plugin-host:4000"
      # LOG_LEVEL: warn   # debug|info|warn|error — default info
    volumes:
      - arrgh_data:/data
    depends_on:
      plugin-host:
        condition: service_healthy

  plugin-host:
    image: ghcr.io/t2vi/plugin-host:latest
    restart: unless-stopped
    environment:
      PORT: "4000"
      LANGUAGES: "en"
      CLOAKBROWSER_WS_URL: "http://cloakbrowser:3000"
      COMMUNITY_BUNDLES_DIR: /community-bundles
    volumes:
      - plugin_community_bundles:/community-bundles
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/plugins"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      - cloakbrowser

  cloakbrowser:
    image: ghcr.io/t2vi/cloakbrowser-server:latest
    platform: linux/amd64
    restart: unless-stopped
    environment:
      CDP_PORT: "3000"
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  arrgh_data:
  plugin_community_bundles:
