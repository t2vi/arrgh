services:
  arrgh:
    build: .
    volumes:
      - ./web/dist:/var/www/arrgh:ro   # dev: serve local build without image rebuild

  plugin-host:
    build:
      context: .
      dockerfile: plugin-host/Dockerfile

  cloakbrowser:
    platform: linux/amd64
    build:
      context: docker/cloakbrowser-server
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
