name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Layer 1: Unit tests ────────────────────────────────────────────────────

  unit-server:
    name: Unit — Server (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Setup Node (for trx-to-allure)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Unit tests
        run: dotnet test --filter "Category=Unit" --logger "trx;LogFileName=unit-results.trx"

      - name: Integration tests
        run: dotnet test --filter "Category=Integration" --logger "trx;LogFileName=integration-results.trx"

      - name: Convert TRX → Allure
        if: always()
        run: |
          node trx-to-allure.mjs unit-results.trx        allure-results unit
          node trx-to-allure.mjs integration-results.trx allure-results integration

      - name: Upload TRX results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dotnet-test-results
          path: server-tests/*.trx

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-dotnet
          path: server-tests/allure-results

  unit-web:
    name: Unit — Web (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-web
          path: web/allure-results

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: web/coverage

      - name: Build
        run: npm run build

  # ── Plugins (independent, no test layer yet) ───────────────────────────────

  plugins:
    name: Plugins + Plugin Host (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: npm ci (workspace)
        run: npm ci

      - name: Build plugin bundles
        run: npm run build:plugins

      - name: Build plugin-host
        run: npm run build
        working-directory: plugin-host

  # ── Allure report → GitHub Pages /test-reports/ ───────────────────────────

  report:
    name: Allure Report
    runs-on: ubuntu-latest
    needs: [unit-server, unit-web]
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch previous Allure history
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results

      - name: Restore history and write categories
        run: |
          mkdir -p allure-results
          if [ -d gh-pages/test-reports/history ]; then
            cp -r gh-pages/test-reports/history allure-results/history
          fi
          cp allure-categories.json allure-results/categories.json

      - name: Setup Node (for allure-commandline)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Push raw unit+integration results to gh-pages cache
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: allure-results
          target-folder: allure-raw/unit-integration
          clean: true

      - name: Generate combined Allure report
        run: |
          mkdir -p combined-raw
          # unit+integration (just pushed above — use directly)
          cp -r allure-results/. combined-raw/
          # e2e layer from last run (if any)
          if [ -d gh-pages/allure-raw/e2e ]; then
            cp -r gh-pages/allure-raw/e2e/. combined-raw/
          fi
          if [ -d gh-pages/test-reports/history ]; then
            cp -r gh-pages/test-reports/history combined-raw/history
          fi
          cp allure-categories.json combined-raw/categories.json
          npx allure-commandline@2 generate combined-raw --clean -o allure-report

      - name: Apply custom theme
        run: |
          cp .allure/custom.css allure-report/custom.css
          sed -i 's|</head>|<script>document.documentElement.setAttribute("data-theme","dark")</script><link rel="stylesheet" href="custom.css"></head>|' allure-report/index.html

      - name: Deploy combined Allure report
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: allure-report
          target-folder: test-reports
