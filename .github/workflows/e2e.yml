name: E2e

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2e
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cache Docker layers (arrgh build)
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-arrgh-${{ hashFiles('server/Cargo.lock', 'web/package-lock.json', 'Dockerfile') }}
          restore-keys: ${{ runner.os }}-buildx-arrgh-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Build fixture plugin
        working-directory: plugins/fixture
        run: npm install --omit=dev

      - name: Start test stack
        run: docker compose -f docker-compose.test.yml up -d --build --wait
        timeout-minutes: 5

      - name: Run Playwright tests
        working-directory: e2e
        run: npm test
        env:
          CI: true

      - name: Stop test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      # ── Allure shared-cache update ─────────────────────────────────────────

      - name: Fetch gh-pages for shared Allure cache
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Setup Node for Allure
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Push raw e2e results to gh-pages cache
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: e2e/allure-results
          target-folder: allure-raw/e2e
          clean: true

      - name: Generate combined Allure report
        run: |
          mkdir -p combined-raw
          # unit+integration from last ci run
          if [ -d gh-pages/allure-raw/unit-integration ]; then
            cp -r gh-pages/allure-raw/unit-integration/. combined-raw/
          fi
          # fresh e2e results
          if [ -d e2e/allure-results ]; then
            cp -r e2e/allure-results/. combined-raw/
          fi
          if [ -d gh-pages/test-reports/history ]; then
            cp -r gh-pages/test-reports/history combined-raw/history
          fi
          cp allure-categories.json combined-raw/categories.json
          npx allure-commandline@2 generate combined-raw --clean -o allure-report
          cp .allure/custom.css allure-report/custom.css
          sed -i 's|</head>|<script>document.documentElement.setAttribute("data-theme","dark")</script><link rel="stylesheet" href="custom.css"></head>|' allure-report/index.html

      - name: Deploy combined Allure report
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: allure-report
          target-folder: test-reports
